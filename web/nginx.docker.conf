http {

    lua_shared_dict token_cache 1m;  # Bộ nhớ chia sẻ để lưu cache token

    server {
        listen 80;
        client_max_body_size 10M;

        root  /usr/local/openresty/nginx/html;
        include /usr/local/openresty/nginx/conf/mime.types;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
        resolver local=on ipv6=off;
        resolver_timeout 5s;

        location /accounts/confirm-email/ {
            try_files $uri /index.html;
        }

        location /e/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/get_token.lua;
            proxy_pass https://8080-che1111-playbooks-qr956k6nf5q.ws-us117.gitpod.io;
        }

        location /accounts {
            access_by_lua_file /usr/local/openresty/nginx/lua/get_token.lua;
            proxy_pass https://8080-che1111-playbooks-qr956k6nf5q.ws-us117.gitpod.io;
        }

        location /connectors/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/get_token.lua;
            proxy_pass https://8080-che1111-playbooks-qr956k6nf5q.ws-us117.gitpod.io;
        }

        location /pb/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/get_token.lua;
            proxy_pass https://8080-che1111-playbooks-qr956k6nf5q.ws-us117.gitpod.io;
        }

        location /executor/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/get_token.lua;
            proxy_pass https://8080-che1111-playbooks-qr956k6nf5q.ws-us117.gitpod.io;
        }

        location /media/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/get_token.lua;
            proxy_pass https://8080-che1111-playbooks-qr956k6nf5q.ws-us117.gitpod.io;
        }

        location /management {
            access_by_lua_file /usr/local/openresty/nginx/lua/get_token.lua;
            proxy_pass https://8080-che1111-playbooks-qr956k6nf5q.ws-us117.gitpod.io;
        }

        location / {
            try_files $uri /index.html;
        }
    }

    access_log /dev/stdout;
}
